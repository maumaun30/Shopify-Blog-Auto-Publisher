# CloudPanel vhost config — paste this into the Nginx Vhost section of your site
# in CloudPanel → Sites → YOUR_DOMAIN → Vhost

location / {
    # Port must match APP_PORT in your .env
    proxy_pass http://127.0.0.1:YOUR_APP_PORT;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Long timeout for /publish-blog jobs (AI + image processing takes time)
    proxy_read_timeout 600s;
    proxy_connect_timeout 60s;
    proxy_send_timeout 600s;

    # Upload size limit for .docx files
    client_max_body_size 20M;
}
